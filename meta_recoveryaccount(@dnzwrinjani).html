<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pemulihan Akun</title>

  <link rel="stylesheet" href="index.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <div class="header-content">

      <div class="logo-section">

        <!-- GANTI LOGO SENDIRI -->
        <img src="logo.png" class="logo" alt="Logo">

        <h1 class="header-title">
          Pemulihan Akun
        </h1>

      </div>

    </div>

  </header>


  <!-- CONTAINER -->
  <div class="container">

    <!-- FORM -->
    <form>

      <!-- EMAIL -->
      <div class="form-group">

        <label>
          Email atau Username :
        </label>

        <input
          type="text"
          placeholder="Masukkan email atau username"
        >

      </div>


      <!-- PASSWORD LAMA -->
      <div class="form-group">

        <label>
          Sandi saat ini :
        </label>

        <input
          type="password"
          placeholder="Masukkan sandi saat ini"
        >

      </div>


      <!-- PASSWORD BARU -->
      <div class="form-group">

        <label>
          Sandi Baru :
        </label>

        <input
          type="password"
          placeholder="Masukkan sandi baru"
        >

      </div>


      <!-- KONFIRMASI -->
      <div class="form-group">

        <label>
          Konfirmasi Sandi Baru :
        </label>

        <input
          type="password"
          placeholder="Konfirmasi sandi baru"
        >

      </div>


      <!-- BUTTON -->
      <button type="submit">
        Submit
      </button>

    </form>


    <!-- DESCRIPTION -->
    <p class="description">

      Jika Anda mengalami masalah saat login ke akun, berikut beberapa tips
      untuk membantu memulihkan kata sandi akun Anda, mengatasi masalah email,
      mengonfirmasi identitas Anda, atau mempelajari apa yang bisa Anda lakukan
      jika akun Anda diretas.

    </p>

  </div>

</body>
</html>
